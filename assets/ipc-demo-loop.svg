<svg width="960" height="640" viewBox="0 0 960 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="demoBg" x1="80" y1="56" x2="826" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2740"/>
      <stop offset="1" stop-color="#06111D"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#112F4C"/>
      <stop offset="1" stop-color="#091927"/>
    </linearGradient>
    <linearGradient id="feedGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#79F0FF"/>
      <stop offset="1" stop-color="#108FE6"/>
    </linearGradient>
    <style>
      .label {
        fill: #e8f7ff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .small {
        fill: #8aa7bf;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 14px;
      }
      .dash {
        stroke: #5bddff;
        stroke-width: 3;
        stroke-dasharray: 10 10;
        opacity: 0.6;
        animation: dashMove 3s linear infinite;
      }
      .pulse {
        animation: pulse 2.2s ease-in-out infinite;
        transform-origin: center;
      }
      .scan {
        animation: scanMove 3.6s ease-in-out infinite;
      }
      .bar1 { animation: barUp 2.8s ease-in-out infinite; }
      .bar2 { animation: barUp 2.8s ease-in-out infinite 0.3s; }
      .bar3 { animation: barUp 2.8s ease-in-out infinite 0.6s; }
      .alert {
        animation: alertBlink 1.2s ease-in-out infinite;
      }
      @keyframes dashMove {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -40; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.12); opacity: 1; }
      }
      @keyframes scanMove {
        0% { transform: translateY(-118px); opacity: 0; }
        14% { opacity: 0.75; }
        50% { transform: translateY(118px); opacity: 0.45; }
        100% { transform: translateY(118px); opacity: 0; }
      }
      @keyframes barUp {
        0%, 100% { transform: scaleY(0.45); transform-origin: bottom; }
        50% { transform: scaleY(1); transform-origin: bottom; }
      }
      @keyframes alertBlink {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="24" y="24" width="912" height="592" rx="30" fill="url(#demoBg)"/>
  <rect x="54" y="54" width="852" height="58" rx="18" fill="#091927" stroke="rgba(91,221,255,0.16)"/>
  <circle cx="88" cy="83" r="7" fill="#5bddff"/>
  <circle cx="110" cy="83" r="7" fill="#5bddff" fill-opacity="0.45"/>
  <circle cx="132" cy="83" r="7" fill="#5bddff" fill-opacity="0.25"/>
  <text x="166" y="88" class="label">IPC PRODUCT + CLOUD + AI</text>

  <rect x="54" y="142" width="404" height="224" rx="24" fill="url(#cardBg)" stroke="rgba(91,221,255,0.16)"/>
  <text x="86" y="182" class="label">Camera Feed A</text>
  <text x="86" y="210" class="small">Outdoor PTZ / AI Detection Enabled</text>
  <rect x="86" y="232" width="340" height="102" rx="18" fill="#07131F" stroke="rgba(91,221,255,0.18)"/>
  <path d="M102 312C148 260 200 250 246 278C288 304 324 304 410 248" stroke="url(#feedGlow)" stroke-width="6" stroke-linecap="round"/>
  <rect x="86" y="232" width="340" height="102" rx="18" fill="url(#feedGlow)" fill-opacity="0.04"/>
  <rect x="86" y="232" width="340" height="14" rx="7" fill="#5bddff" fill-opacity="0.15" class="scan"/>
  <circle cx="358" cy="286" r="28" fill="#0D2237" stroke="#5bddff" stroke-opacity="0.35"/>
  <circle cx="358" cy="286" r="12" fill="#5bddff" class="pulse"/>

  <rect x="488" y="142" width="418" height="224" rx="24" fill="url(#cardBg)" stroke="rgba(91,221,255,0.16)"/>
  <text x="520" y="182" class="label">Cloud Dashboard</text>
  <text x="520" y="210" class="small">Playback / Alerts / Device Status / API Layer</text>
  <rect x="520" y="238" width="122" height="96" rx="18" fill="#091927" stroke="rgba(91,221,255,0.15)"/>
  <rect x="544" y="302" width="18" height="18" rx="6" fill="#5bddff" class="bar1"/>
  <rect x="574" y="276" width="18" height="44" rx="6" fill="#5bddff" class="bar2"/>
  <rect x="604" y="254" width="18" height="66" rx="6" fill="#5bddff" class="bar3"/>
  <rect x="666" y="238" width="208" height="40" rx="14" fill="#091927" stroke="rgba(91,221,255,0.15)"/>
  <text x="688" y="264" class="small">Device Online</text>
  <circle cx="832" cy="258" r="8" fill="#7dffcf"/>
  <rect x="666" y="294" width="208" height="40" rx="14" fill="#091927" stroke="rgba(91,221,255,0.15)"/>
  <text x="688" y="320" class="small">Alert Triggered</text>
  <circle cx="832" cy="314" r="8" fill="#66e7ff" class="alert"/>

  <path d="M460 256C488 256 490 256 518 256" class="dash"/>
  <path d="M460 308C488 308 490 308 518 308" class="dash"/>

  <rect x="54" y="396" width="852" height="170" rx="24" fill="url(#cardBg)" stroke="rgba(91,221,255,0.16)"/>
  <text x="86" y="438" class="label">Turnkey Flow</text>
  <text x="86" y="466" class="small">Products -> Connectivity -> Cloud -> AI -> Deployment</text>

  <rect x="86" y="492" width="128" height="42" rx="16" fill="#0A2032" stroke="rgba(91,221,255,0.18)"/>
  <text x="118" y="519" class="small">Products</text>
  <rect x="254" y="492" width="128" height="42" rx="16" fill="#0A2032" stroke="rgba(91,221,255,0.18)"/>
  <text x="275" y="519" class="small">Connectivity</text>
  <rect x="422" y="492" width="128" height="42" rx="16" fill="#0A2032" stroke="rgba(91,221,255,0.18)"/>
  <text x="461" y="519" class="small">Cloud</text>
  <rect x="590" y="492" width="128" height="42" rx="16" fill="#0A2032" stroke="rgba(91,221,255,0.18)"/>
  <text x="641" y="519" class="small">AI</text>
  <rect x="758" y="492" width="116" height="42" rx="16" fill="#0A2032" stroke="rgba(91,221,255,0.18)"/>
  <text x="784" y="519" class="small">Delivery</text>

  <path d="M214 513H254" class="dash"/>
  <path d="M382 513H422" class="dash"/>
  <path d="M550 513H590" class="dash"/>
  <path d="M718 513H758" class="dash"/>
</svg>
